
    <svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#0F0C1B"/>
          <stop offset="50%" stop-color="#040206"/>
          <stop offset="100%" stop-color="#0F0C1B"/>
        </linearGradient>
        <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
          <path d="M 0 0 L 10 5 L 0 10 z" fill="#00FFFF" />
        </marker>
        <!-- Import Google Fonts inside SVG -->
        <style>
          @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700&amp;family=Forum&amp;display=swap');
        </style>
      </defs>
      
      <!-- Background -->
      <rect width="800" height="600" fill="url(#bgGrad)"/>
      <rect width="800" height="600" fill="none" stroke="#8A2BE2" stroke-width="4" opacity="0.4"/>
      <circle cx="0" cy="0" r="300" fill="#8A2BE2" opacity="0.05" filter="blur(80px)"/>
      <circle cx="800" cy="600" r="300" fill="#00FFFF" opacity="0.05" filter="blur(80px)"/>

      <!-- Body Content -->
      
        <text x="400" y="100" text-anchor="middle" font-family="'Forum', serif" font-size="28" fill="#FFFFFF" letter-spacing="2">Configuration Blueprint</text>
        
        <!-- Code Window Mockup -->
        <rect x="100" y="160" width="600" height="300" rx="8" fill="#07050A" stroke="#00FFFF" stroke-width="1"/>
        <circle cx="130" cy="185" r="6" fill="#FF5F56"/>
        <circle cx="150" cy="185" r="6" fill="#FFBD2E"/>
        <circle cx="170" cy="185" r="6" fill="#27C93F"/>
        
        <!-- Code Lines -->
        <text x="130" y="240" font-family="monospace" font-size="14" fill="#6272A4"># Environment Settings & Bindings</text>
        <text x="130" y="270" font-family="monospace" font-size="14" fill="#8A2BE2">AETHERA_TOKEN<text fill="#FFFFFF"> = </text><text fill="#00FFFF">"env.get_secret_token"</text></text>
        <text x="130" y="300" font-family="monospace" font-size="14" fill="#8A2BE2">DB_CONNECTION<text fill="#FFFFFF"> = </text><text fill="#00FFFF">"active_bindings"</text></text>
        <text x="130" y="330" font-family="monospace" font-size="14" fill="#8A2BE2">PORT<text fill="#FFFFFF"> = </text><text fill="#50FA7B">3000</text></text>
        <text x="130" y="360" font-family="monospace" font-size="14" fill="#6272A4">// Production ready deploy configuration</text>
      
      
      <!-- Footer Brand Info -->
      <text x="50" y="550" font-family="'DM Sans', sans-serif" font-size="12" fill="#666666">DEVELOPER SCRIPT SERIES</text>
      <text x="750" y="550" text-anchor="end" font-family="'DM Sans', sans-serif" font-size="12" fill="#8A2BE2">BY @SH20RAJ</text>
    </svg>
  