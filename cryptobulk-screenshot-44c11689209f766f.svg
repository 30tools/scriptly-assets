
    <svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#0D0E12"/>
          <stop offset="50%" stop-color="#040206"/>
          <stop offset="100%" stop-color="#0D0E12"/>
        </linearGradient>
        <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
          <path d="M 0 0 L 10 5 L 0 10 z" fill="#00FF7F" />
        </marker>
        <!-- Import Google Fonts inside SVG -->
        <style>
          @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700&amp;family=Forum&amp;display=swap');
        </style>
      </defs>
      
      <!-- Background -->
      <rect width="800" height="600" fill="url(#bgGrad)"/>
      <rect width="800" height="600" fill="none" stroke="#F7931A" stroke-width="4" opacity="0.4"/>
      <circle cx="0" cy="0" r="300" fill="#F7931A" opacity="0.05" filter="blur(80px)"/>
      <circle cx="800" cy="600" r="300" fill="#00FF7F" opacity="0.05" filter="blur(80px)"/>

      <!-- Body Content -->
      
        <text x="400" y="100" text-anchor="middle" font-family="'Forum', serif" font-size="28" fill="#FFFFFF" letter-spacing="2">System Architecture</text>
        
        <!-- Box 1 -->
        <rect x="80" y="220" width="160" height="120" rx="10" fill="#0D0E12" stroke="#F7931A" stroke-width="2"/>
        <text x="160" y="275" text-anchor="middle" font-family="'DM Sans', sans-serif" font-size="16" fill="#FFFFFF" font-weight="bold">User Interface</text>
        <text x="160" y="305" text-anchor="middle" font-family="'DM Sans', sans-serif" font-size="12" fill="#00FF7F">Telegram App</text>
        
        <!-- Arrow 1 -->
        <path d="M250 280 L310 280" fill="none" stroke="#00FF7F" stroke-width="2" stroke-dasharray="5 3" marker-end="url(#arrow)"/>
        
        <!-- Box 2 -->
        <rect x="320" y="220" width="160" height="120" rx="10" fill="#0D0E12" stroke="#00FF7F" stroke-width="2"/>
        <text x="400" y="275" text-anchor="middle" font-family="'DM Sans', sans-serif" font-size="16" fill="#FFFFFF" font-weight="bold">Serverless</text>
        <text x="400" y="305" text-anchor="middle" font-family="'DM Sans', sans-serif" font-size="12" fill="#F7931A">Cloudflare Worker</text>
        
        <!-- Arrow 2 -->
        <path d="M490 280 L550 280" fill="none" stroke="#F7931A" stroke-width="2" stroke-dasharray="5 3" marker-end="url(#arrow)"/>
        
        <!-- Box 3 -->
        <rect x="560" y="220" width="160" height="120" rx="10" fill="#0D0E12" stroke="#F7931A" stroke-width="2"/>
        <text x="640" y="275" text-anchor="middle" font-family="'DM Sans', sans-serif" font-size="16" fill="#FFFFFF" font-weight="bold">Service Core</text>
        <text x="640" y="305" text-anchor="middle" font-family="'DM Sans', sans-serif" font-size="12" fill="#00FF7F">Python Backend</text>
      
      
      <!-- Footer Brand Info -->
      <text x="50" y="550" font-family="'DM Sans', sans-serif" font-size="12" fill="#666666">DEVELOPER SCRIPT SERIES</text>
      <text x="750" y="550" text-anchor="end" font-family="'DM Sans', sans-serif" font-size="12" fill="#F7931A">BY @SH20RAJ</text>
    </svg>
  